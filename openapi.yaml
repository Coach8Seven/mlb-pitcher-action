openapi: 3.1.0
info:
  title: MLB Pitcher Strikeout Helper
  description: Returns recent MLB pitcher starts with strikeouts, pitch counts, pitch mix, and velocity trend for pitcher strikeout prop research.
  version: 1.1.0
servers:
  - url: https://coach8seven-mlb-pitcher-action.onrender.com
paths:
  /pitcher-last-starts:
    get:
      operationId: getPitcherLastStarts
      summary: Get a pitcher's recent starts with strikeouts, pitch counts, pitch mix, and velocity trend.
      description: Use this action when the GPT needs reliable last 5 and last 10 pitcher strikeout logs, pitch counts, innings, opponent, pitch mix, velocity trend, and hit rate versus a strikeout line.
      parameters:
        - name: pitcher_name
          in: query
          required: true
          description: Full or common name of the MLB pitcher, such as Paul Skenes.
          schema:
            type: string
        - name: season
          in: query
          required: false
          description: MLB season year. Use the current MLB season unless the user asks otherwise.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Number of recent starts to return. Use 10 by default.
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 15
        - name: line
          in: query
          required: false
          description: Strikeout prop line, such as 5.5. Used to calculate last 5 and last 10 hit rate for an Over.
          schema:
            type: number
        - name: include_pitch_mix
          in: query
          required: false
          description: Whether to include pitch-level pitch mix, velocity, spin, whiff rate, CSW rate, and pitch-mix trend from MLB live-feed data. Use true by default.
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Recent pitcher starts, summary statistics, and pitch mix trend when available.
          content:
            application/json:
              schema:
                type: object
                properties:
                  pitcher:
                    type: object
                  season:
                    type: string
                  starts:
                    type: array
                    items:
                      type: object
                  summary:
                    type: object
                  pitchMixTrend:
                    type: object
                  notes:
                    type: array
                    items:
                      type: string
        "400":
          description: Missing required pitcher_name.
        "404":
          description: Pitcher not found.
